<!-- Chat Toggle Button -->
<button class="chat-toggle" (click)="toggle()" [class.open]="isOpen()" aria-label="Open FAQ Chat">
  @if (!isOpen()) {
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="26" height="26">
      <path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2.003 22l4.985-1.302A9.942 9.942 0 0 0 12 22c5.523 0 10-4.477 10-10S17.523 2 12 2zm-1 13H8v-2h3v2zm0-4H8V7h3v4zm5 4h-3v-2h3v2zm0-4h-3V7h3v4z"/>
    </svg>
  } @else {
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
      <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    </svg>
  }
  @if (!isOpen()) {
    <span class="badge">FAQ</span>
  }
</button>

<!-- Chat Window -->
@if (isOpen()) {
  <div class="chat-window" @windowAnimation>
    <!-- Header -->
    <div class="chat-header">
      <div class="header-avatar">🏗️</div>
      <div class="header-info">
        <span class="header-name">Bashir Associates</span>
        <span class="header-status">● Online — Ask me anything</span>
      </div>
      <button class="close-btn" (click)="toggle()">✕</button>
    </div>

    <!-- Messages -->
    <div class="chat-messages" #messageContainer [@listAnimation]="messages().length">
      @for (msg of messages(); track $index) {
        <div class="message" [class.user]="msg.isUser" [class.bot]="!msg.isUser">
          @if (!msg.isUser) {
            <div class="bot-avatar">🏗️</div>
          }
          <div class="bubble">
            <p [innerHTML]="msg.text.replace('\n', '<br>')"></p>
            <span class="time">{{ msg.time }}</span>
          </div>
        </div>
      }

      <!-- Typing Indicator -->
      @if (isTyping()) {
        <div class="message bot typing-message">
          <div class="bot-avatar">🏗️</div>
          <div class="bubble typing-bubble">
            <div class="typing-indicator">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
        </div>
      }
    </div>

    <!-- Quick Suggestions -->
    <div class="suggestions">
      <p class="suggestions-label">Frequently Asked:</p>
      <div class="suggestions-list">
        @for (s of suggestions; track $index) {
          <button class="suggestion-chip" (click)="selectSuggestion(s)">{{ s }}</button>
        }
      </div>
    </div>

    <!-- Input -->
    <div class="chat-input">
      <input
        type="text"
        [(ngModel)]="userInput"
        (keydown)="onKeydown($event)"
        placeholder="Type your question..."
        maxlength="300"
      />
      <button class="send-btn" (click)="send()" [disabled]="!userInput.trim() || isTyping()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>
}
