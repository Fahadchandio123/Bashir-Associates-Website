<nav [class.scrolled]="isScrolled" [class.mobile-open]="isMobileMenuOpen">
  <div class="nav-container container">
    <div class="logo" (click)="scrollToSection('home')">
      <span>BASHIR</span>
      <span class="gold">ASSOCIATES</span>
    </div>

    <div class="nav-links" [class.active]="isMobileMenuOpen">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="isMobileMenuOpen = false">Home</a>
      <a routerLink="/about" routerLinkActive="active" (click)="isMobileMenuOpen = false">About</a>
      <a routerLink="/projects" routerLinkActive="active" (click)="isMobileMenuOpen = false">Projects</a>
      <a routerLink="/services" routerLinkActive="active" (click)="isMobileMenuOpen = false">Services</a>
      <a routerLink="/contact" routerLinkActive="active" class="nav-cta" (click)="isMobileMenuOpen = false">Get In Touch</a>
    </div>

    <div class="hamburger" (click)="toggleMobileMenu()">
      <div class="line"></div>
      <div class="line"></div>
      <div class="line"></div>
    </div>
  </div>
</nav>
