<section class="hero">
  <div class="hero-overlay"></div>
  <div class="hero-content container">
    <div class="hero-text-wrapper">
      <h1 class="reveal-text">Building Tomorrow's <span class="gold">Legacy</span></h1>
      <p class="reveal-text-slow">Premier builders and developers crafting modern architectural excellence with precision and vision.</p>
      <div class="hero-actions">
        <button class="btn btn-gold" (click)="scrollToSection('projects')">View Our Projects</button>
        <button class="btn btn-outline" (click)="scrollToSection('contact')">Get In Touch</button>
      </div>
    </div>
  </div>
  <div class="scroll-indicator" (click)="scrollToSection('about')">
    <div class="mouse">
      <div class="wheel"></div>
    </div>
    <span>Scroll Down</span>
  </div>
</section>
